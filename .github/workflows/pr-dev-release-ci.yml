name: PR to dev or release — build and test

on:
  pull_request:
    branches: [dev, release]

concurrency:
  group: ci-${{ github.base_ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint

      - name: Verify Go Lambdas compile
        run: |
          go build -o /dev/null ./functions/create/
          go build -o /dev/null ./functions/redirect/

      - name: Build web app
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.example.com
        run: npm run build
